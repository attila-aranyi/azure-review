trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  azureSubscription: "azure-service-connection" # Azure Resource Manager service connection name
  acrName: "acrcodereview"                      # ACR name (no .azurecr.io)
  imageName: "llm-review-service"
  resourceGroup: "rg-code-review"
  containerAppName: "ca-llm-review"
  nodeVersion: "20"
  serviceDir: "$(Build.SourcesDirectory)/llm-review-service"

stages:
  # ── Stage 1: Build & Test ──────────────────────────────────────────
  - stage: BuildAndTest
    displayName: "Build & Test"
    jobs:
      - job: Test
        displayName: "Lint, Typecheck, Build, Test"
        steps:
          - task: NodeTool@0
            displayName: "Use Node.js $(nodeVersion)"
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: "Install dependencies"
            workingDirectory: $(serviceDir)

          - script: npm run lint
            displayName: "Lint"
            workingDirectory: $(serviceDir)

          - script: npm run typecheck
            displayName: "Type check"
            workingDirectory: $(serviceDir)

          - script: npm run build
            displayName: "Build"
            workingDirectory: $(serviceDir)

          - script: npm run test:coverage
            displayName: "Test with coverage"
            workingDirectory: $(serviceDir)

          - task: PublishTestResults@2
            displayName: "Publish test results"
            condition: succeededOrFailed()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "**/junit-*.xml"
              mergeTestResults: true
            continueOnError: true

  # ── Stage 2: Docker Build & Push to ACR ────────────────────────────
  - stage: DockerBuildPush
    displayName: "Docker Build & Push"
    dependsOn: BuildAndTest
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Docker
        displayName: "Build & push image to ACR"
        steps:
          - task: AzureCLI@2
            displayName: "Login to ACR, build and push image"
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              workingDirectory: $(serviceDir)
              inlineScript: |
                ACR_SERVER=$(az acr show --name $(acrName) --query loginServer -o tsv)
                az acr credential show --name $(acrName) --query "passwords[0].value" -o tsv | \
                  docker login "$ACR_SERVER" --username $(acrName) --password-stdin

                docker build -t "$ACR_SERVER/$(imageName):$(Build.BuildId)" \
                             -t "$ACR_SERVER/$(imageName):latest" \
                             .
                docker push "$ACR_SERVER/$(imageName):$(Build.BuildId)"
                docker push "$ACR_SERVER/$(imageName):latest"

  # ── Stage 3: Deploy to Azure Container Apps ────────────────────────
  - stage: Deploy
    displayName: "Deploy to Container Apps"
    dependsOn: DockerBuildPush
    condition: succeeded()
    jobs:
      - deployment: DeployContainerApp
        displayName: "Deploy to Azure Container Apps"
        environment: production
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: "Update Container App"
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az containerapp update \
                        --name $(containerAppName) \
                        --resource-group $(resourceGroup) \
                        --image $(acrName).azurecr.io/$(imageName):$(Build.BuildId)
