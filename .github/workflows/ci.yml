name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: llm-review-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: llm-review-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

  node-tests:
    name: Node.js Tests (unit + integration)
    runs-on: ubuntu-latest
    needs: gate
    defaults:
      run:
        working-directory: llm-review-service

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: llmreview
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: llm_review_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U llmreview"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: llm-review-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          DATABASE_URL: postgresql://llmreview:testpassword@localhost:5432/llm_review_test

  python-tests:
    name: Python Tests (axon-sidecar)
    runs-on: ubuntu-latest
    needs: gate
    defaults:
      run:
        working-directory: llm-review-service/src/axon-sidecar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: llm-review-service/src/axon-sidecar/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: python -m pytest -v

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: gate
    defaults:
      run:
        working-directory: llm-review-service

    steps:
      - uses: actions/checkout@v4

      - name: Build main service image
        run: docker build -t llm-review-service .

      - name: Build axon-sidecar image
        run: docker build -t axon-sidecar ./src/axon-sidecar
